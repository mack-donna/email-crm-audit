services:
  - type: web
    name: email-outreach-automation
    runtime: python3
    # Run DB migrations and seed plans on every deploy before starting
    buildCommand: pip install -r requirements.txt && flask db upgrade && flask seed-plans
    startCommand: python run.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false

      # Render auto-generates a cryptographically strong secret
      - key: FLASK_SECRET_KEY
        generateValue: true

      # Injected automatically from the DB instance created below
      - key: DATABASE_URL
        fromDatabase:
          name: email-crm-audit-db
          property: connectionString

      # ── Resend (transactional email) — set in dashboard after signup ──────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Outreach AI

      # ── Google OAuth SSO — console.cloud.google.com ───────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Microsoft OAuth SSO — portal.azure.com ────────────────────────────
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        value: common

      # ── Existing secrets ──────────────────────────────────────────────────
      - key: GOOGLE_OAUTH_CONFIG
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false

      # ── Stripe — wired, not yet active ───────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

    disk:
      name: user-data
      mountPath: /opt/render/project/src/user_data
      sizeGB: 5

# PostgreSQL — provisioned via Render MCP (id: dpg-d9051ee8bjmc738te970-a)
# Free plan expires 2026-07-27. Upgrade to basic_256mb ($7/mo) before then.
databases:
  - name: email-crm-audit-db
    plan: free